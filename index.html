<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Sales Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' },
                        success: { 500: '#10b981', 600: '#059669', 50: '#ecfdf5', 700: '#047857', 200: '#a7f3d0' },
                        warning: { 500: '#f59e0b', 600: '#d97706', 50: '#fffbeb', 700: '#b45309', 200: '#fde68a' },
                        danger: { 500: '#ef4444', 600: '#dc2626', 50: '#fef2f2', 700: '#b91c1c', 200: '#fecaca' },
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 900: '#0f172a' }
                    },
                    boxShadow: {
                        'premium': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01)',
                        'card': '0 2px 10px rgba(15, 23, 42, 0.03), 0 0 1px rgba(15, 23, 42, 0.1)'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #f8fafc; color: #0f172a; }
        
        /* Custom Scrollbar for tables */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animated-header-bg {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #1e3a8a, #0f172a);
            background-size: 400% 400%;
        }

        /* Native CSS Animations (Guaranteed to work on deployment) */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in-up {
            opacity: 0; /* Stay hidden until animation starts */
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes gradientX {
            0%, 100% { background-size: 200% 200%; background-position: left center; }
            50% { background-size: 200% 200%; background-position: right center; }
        }
        
        .animate-gradient-x {
            animation: gradientX 10s ease infinite;
        }

        /* Animation Delays */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // Formats numbers as Indian Rupees (Lakhs, Crores)
        const formatCurrency = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val || 0);
        const formatNumber = (val) => new Intl.NumberFormat('en-IN', { maximumFractionDigits: 1 }).format(val || 0);
        const formatPercent = (val) => `${formatNumber(val)}%`;
        
        const getStatusColor = (percent) => {
            if (percent >= 100) return 'text-success-600';
            if (percent >= 71) return 'text-primary-600';
            if (percent >= 31) return 'text-warning-600';
            return 'text-danger-600';
        };

        const getStatusBadge = (percent) => {
            if (percent >= 100) return 'bg-success-50 text-success-700 border-success-200';
            if (percent >= 71) return 'bg-primary-50 text-primary-700 border-primary-200';
            if (percent >= 31) return 'bg-warning-50 text-warning-700 border-warning-200';
            return 'bg-danger-50 text-danger-700 border-danger-200';
        };

        // CSV Parser - Strips out commas and currency symbols for flawless math
        const parseCSV = (csvText) => {
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            
            return lines.slice(1).map(line => {
                const values = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const obj = {};
                headers.forEach((header, i) => {
                    let val = values[i] ? values[i].replace(/^"|"$/g, '').trim() : '';
                    
                    // Strip out currency signs, percentages, and commas so math works automatically
                    let cleanStr = val.replace(/[₹$,%]/g, '');
                    if (!isNaN(cleanStr) && cleanStr !== '') {
                        val = Number(cleanStr);
                    }
                    obj[header] = val;
                });
                return obj;
            });
        };

        // Fixed Icon component for deployment (prevents React Hydration crashes)
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size }
                    });
                }
            }, [name, className, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const Card = ({ children, className = "", title, action, delay = "" }) => (
            <div className={`bg-white rounded-2xl shadow-card p-6 flex flex-col h-full border border-slate-100 hover:shadow-premium transition-all duration-300 animate-fade-in-up ${delay} ${className}`}>
                {(title || action) && (
                    <div className="flex justify-between items-center mb-6">
                        {title && <h3 className="text-[15px] font-bold text-slate-800">{title}</h3>}
                        {action && <div>{action}</div>}
                    </div>
                )}
                <div className="flex-grow">
                    {children}
                </div>
            </div>
        );

        const KPICard = ({ title, value, subtext, icon, format = 'number', status = 'neutral', delay = "" }) => {
            const formattedValue = format === 'currency' ? formatCurrency(value) : format === 'percent' ? formatPercent(value) : formatNumber(value);
            
            const colors = {
                primary: 'text-primary-600 bg-primary-50',
                success: 'text-success-600 bg-success-50',
                danger: 'text-danger-600 bg-danger-50',
                neutral: 'text-slate-600 bg-slate-100'
            };

            return (
                <div className={`bg-white rounded-2xl shadow-card p-6 border border-slate-100 relative overflow-hidden group hover:shadow-premium hover:-translate-y-1 transition-all duration-300 animate-fade-in-up ${delay}`}>
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-[13px] font-semibold text-slate-500 uppercase tracking-wide mb-2">{title}</p>
                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">{formattedValue}</h2>
                        </div>
                        <div className={`p-3 rounded-xl ${colors[status]}`}>
                            <Icon name={icon} size={24} />
                        </div>
                    </div>
                    {subtext && (
                        <div className="mt-4 pt-4 border-t border-slate-50">
                            <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-50 text-slate-600 border border-slate-100">
                                {subtext}
                            </span>
                        </div>
                    )}
                </div>
            );
        };

        const HallOfFameCard = ({ theme = 'dark', title, name, subtitle, icon, delay = "" }) => {
            const bgClass = theme === 'dark' 
                ? 'bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 border-slate-700' 
                : 'bg-gradient-to-br from-primary-600 via-primary-500 to-primary-700 border-primary-500';
            
            const textClass = theme === 'dark' ? 'text-slate-400' : 'text-primary-100';
            const highlightClass = theme === 'dark' ? 'text-white' : 'text-white';
            
            return (
                <div className={`rounded-2xl p-6 border relative overflow-hidden group hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 animate-fade-in-up ${delay} ${bgClass}`}>
                    <div className="absolute top-0 right-0 p-4 opacity-10 transform group-hover:scale-110 group-hover:rotate-12 transition-transform duration-700">
                        <Icon name={icon} size={100} className="text-white" />
                    </div>
                    <div className="relative z-10 flex flex-col h-full justify-between">
                        <div className="flex items-center space-x-2 mb-6">
                            <Icon name="Star" size={16} className={theme === 'dark' ? 'text-amber-400' : 'text-amber-300'} />
                            <span className={`text-xs font-bold uppercase tracking-widest ${textClass}`}>{title}</span>
                        </div>
                        <div>
                            <h3 className={`text-2xl font-black mb-1 truncate ${highlightClass}`}>{name || 'TBD'}</h3>
                            <p className={`text-sm font-medium ${textClass}`}>{subtitle}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const ChartComponent = ({ type, data, options, height = "250px" }) => {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                    const ctx = canvasRef.current.getContext('2d');
                    Chart.defaults.font.family = "'Inter', sans-serif";
                    Chart.defaults.color = '#64748b';
                    
                    chartInstance.current = new Chart(ctx, { type, data, options });
                }
                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [data, options, type]);

            return (
                <div style={{ height, position: 'relative', width: '100%' }}>
                    <canvas ref={canvasRef}></canvas>
                </div>
            );
        };

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [lastSynced, setLastSynced] = useState(new Date());
            const [isRefreshing, setIsRefreshing] = useState(false);
            
            // Hardcoded connection to the provided Google Sheet link
            const sourceUrl = 'https://docs.google.com/spreadsheets/d/1faXYMBSYEOlUNxmEMS6-LufCwHiOxk_sVKVvqVv3Q_o/gviz/tq?tqx=out:csv&sheet=Dashboard';

            const [filters, setFilters] = useState({
                month: 'All', 
                manager: 'All',
                search: ''
            });

            // Fetch Data Function
            const fetchData = useCallback(async (isManual = false) => {
                if (isManual) setIsRefreshing(true);
                try {
                    const response = await fetch(sourceUrl);
                    const csvText = await response.text();
                    const parsed = parseCSV(csvText);
                    if (parsed.length > 0) {
                        setRawData(parsed);
                        setLastSynced(new Date());
                    }
                } catch (error) {
                    console.error("Failed to fetch data", error);
                } finally {
                    if (isManual) setTimeout(() => setIsRefreshing(false), 500);
                }
            }, [sourceUrl]);

            // Setup Auto-Refresh
            useEffect(() => {
                fetchData(true);
                const interval = setInterval(() => {
                    fetchData();
                }, 2000); 
                return () => clearInterval(interval);
            }, [fetchData]);

            // Data Filters
            const availableMonths = useMemo(() => {
                const months = [...new Set(rawData.map(d => d.Month).filter(Boolean))].sort();
                return months.length ? months : ['June']; // Fallback
            }, [rawData]);

            const availableManagers = useMemo(() => {
                return [...new Set(rawData.map(d => d['Manager Name']).filter(Boolean))].sort();
            }, [rawData]);

            // Apply Filters
            const filteredData = useMemo(() => {
                return rawData.filter(row => {
                    if (!row['Employee Name']) return false;
                    const matchMonth = filters.month === 'All' || row.Month === filters.month;
                    const matchManager = filters.manager === 'All' || row['Manager Name'] === filters.manager;
                    const matchSearch = row['Employee Name']?.toLowerCase().includes(filters.search.toLowerCase()) || false;
                    return matchMonth && matchManager && matchSearch;
                });
            }, [rawData, filters]);

            // Calculate Executive KPIs
            const kpis = useMemo(() => {
                if (!filteredData.length) return null;

                let totalTarget = 0;
                let totalAchieved = 0;

                filteredData.forEach(row => {
                    totalTarget += Number(row.Target) || 0;
                    totalAchieved += Number(row['Sales Achieved']) || 0;
                });

                const achievementPercent = totalTarget > 0 ? (totalAchieved / totalTarget) * 100 : 0;
                const shortfall = Math.max(0, totalTarget - totalAchieved);
                const shortfallPercent = totalTarget > 0 ? (shortfall / totalTarget) * 100 : 0;
                
                // Find top BDE based on highest Achievement %
                let topEmp = null;
                let topEmpPct = -1;
                filteredData.forEach(emp => {
                    const tgt = Number(emp.Target) || 0;
                    const ach = Number(emp['Sales Achieved']) || 0;
                    const pct = tgt > 0 ? (ach / tgt) * 100 : 0;
                    if (pct > topEmpPct && tgt > 0) {
                        topEmpPct = pct;
                        topEmp = emp;
                    }
                });

                // Find top Manager
                const mgrStats = {};
                filteredData.forEach(row => {
                    const mgr = row['Manager Name'];
                    if (!mgr) return;
                    if (!mgrStats[mgr]) mgrStats[mgr] = { target: 0, achieved: 0 };
                    mgrStats[mgr].target += Number(row.Target) || 0;
                    mgrStats[mgr].achieved += Number(row['Sales Achieved']) || 0;
                });

                let topMgr = null;
                let topMgrPct = -1;
                Object.keys(mgrStats).forEach(mgr => {
                    const tgt = mgrStats[mgr].target;
                    const ach = mgrStats[mgr].achieved;
                    const pct = tgt > 0 ? (ach / tgt) * 100 : 0;
                    if (pct > topMgrPct && tgt > 0) {
                        topMgrPct = pct;
                        topMgr = mgr;
                    }
                });

                return {
                    totalTarget,
                    totalAchieved,
                    achievementPercent,
                    shortfall,
                    shortfallPercent,
                    topBDE: topEmp ? { name: topEmp['Employee Name'], pct: topEmpPct } : null,
                    topManager: topMgr ? { name: topMgr, pct: topMgrPct } : null
                };
            }, [filteredData]);

            // Manager Aggregation for Chart
            const managerChartData = useMemo(() => {
                const map = {};
                filteredData.forEach(row => {
                    const mgr = row['Manager Name'];
                    if (!mgr) return;
                    if (!map[mgr]) map[mgr] = { name: mgr, target: 0, achieved: 0 };
                    map[mgr].target += Number(row.Target) || 0;
                    map[mgr].achieved += Number(row['Sales Achieved']) || 0;
                });
                
                const stats = Object.values(map);
                return {
                    labels: stats.map(m => m.name.split(' ')[0]),
                    datasets: [
                        {
                            label: 'Achieved',
                            data: stats.map(m => m.achieved),
                            backgroundColor: '#3b82f6', // Primary Blue
                            borderRadius: 4,
                            barPercentage: 0.6
                        },
                        {
                            label: 'Target',
                            data: stats.map(m => m.target),
                            backgroundColor: '#e2e8f0', // Slate 200
                            borderRadius: 4,
                            barPercentage: 0.6
                        }
                    ]
                };
            }, [filteredData]);

            if (!kpis) return (
                <div className="flex h-screen items-center justify-center bg-slate-50 flex-col">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-4 border-primary-600 mb-4"></div>
                    <p className="text-slate-500 font-medium">Connecting to Google Sheets...</p>
                </div>
            );

            const targetVsActualData = {
                labels: ['Achieved', 'Shortfall'],
                datasets: [{
                    data: [kpis.totalAchieved, kpis.shortfall],
                    backgroundColor: ['#10b981', '#ef4444'], // Success Green, Danger Red
                    borderWidth: 0,
                    cutout: '75%'
                }]
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-12">
                    {/* Live Animated Header */}
                    <div className="animated-header-bg text-white shadow-lg animate-gradient-x relative overflow-hidden">
                        <div className="absolute inset-0 bg-black/10"></div>
                        <div className="max-w-[1600px] mx-auto px-6 py-8 relative z-10">
                            <div className="flex justify-between items-end">
                                <div>
                                    <div className="flex items-center space-x-3 mb-2">
                                        <div className="w-2.5 h-2.5 bg-success-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                                        <span className="text-xs font-bold uppercase tracking-wider text-slate-300">Live Sync Active</span>
                                    </div>
                                    <h1 className="text-3xl font-black tracking-tight text-white">Team Sales Dashboard</h1>
                                </div>
                                <div className="text-right">
                                    <p className="text-sm text-slate-300 font-medium flex items-center justify-end">
                                        <Icon name="RefreshCcw" size={14} className={`mr-1.5 ${isRefreshing ? 'animate-spin' : ''}`} />
                                        Last updated: {lastSynced.toLocaleTimeString()}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Filter Toolbar (Clean, Grey Bar underneath header) */}
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
                        <div className="max-w-[1600px] mx-auto px-6 py-3 flex justify-between items-center">
                            <div className="flex space-x-4 items-center">
                                <span className="text-sm font-semibold text-slate-500 flex items-center">
                                    <Icon name="Filter" size={16} className="mr-2" />
                                    Filters
                                </span>
                                <div className="h-4 w-px bg-slate-300"></div>
                                <div className="flex space-x-2">
                                    <button 
                                        onClick={() => setFilters({...filters, month: 'All'})}
                                        className={`px-3 py-1.5 text-xs font-bold rounded-md transition-colors ${filters.month === 'All' ? 'bg-primary-50 text-primary-700' : 'text-slate-600 hover:bg-slate-100'}`}
                                    >
                                        All Time
                                    </button>
                                    {availableMonths.map(m => (
                                        <button 
                                            key={m}
                                            onClick={() => setFilters({...filters, month: m})}
                                            className={`px-3 py-1.5 text-xs font-bold rounded-md transition-colors ${filters.month === m ? 'bg-primary-50 text-primary-700' : 'text-slate-600 hover:bg-slate-100'}`}
                                        >
                                            {m}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center">
                                <select 
                                    className="bg-slate-50 border border-slate-200 rounded-lg py-1.5 px-3 text-sm font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-primary-500/50 shadow-sm cursor-pointer"
                                    value={filters.manager}
                                    onChange={(e) => setFilters({...filters, manager: e.target.value})}
                                >
                                    <option value="All">All Managers</option>
                                    {availableManagers.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Main Content Dashboard */}
                    <div className="max-w-[1600px] mx-auto px-6 mt-8 space-y-6">
                        
                        {/* ROW 1: KPIs & Hall of Fame */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            {/* Primary Financials */}
                            <div className="lg:col-span-8 grid grid-cols-1 sm:grid-cols-3 gap-6">
                                <KPICard title="Total Team Target" value={kpis.totalTarget} format="currency" icon="Target" status="neutral" delay="delay-100" />
                                <KPICard title="Total Revenue Achieved" value={kpis.totalAchieved} format="currency" icon="CheckCircle2" status="primary" subtext={`Achievement Rate: ${formatPercent(kpis.achievementPercent)}`} delay="delay-200" />
                                <KPICard title="Total Revenue Shortfall" value={kpis.shortfall} format="currency" icon="AlertTriangle" status={kpis.shortfall > 0 ? "danger" : "neutral"} subtext={`Shortfall Gap: ${formatPercent(kpis.shortfallPercent)}`} delay="delay-300" />
                            </div>
                            
                            {/* Hall of Fame */}
                            <div className="lg:col-span-4 grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <HallOfFameCard theme="dark" title="Top Manager" name={kpis.topManager?.name} subtitle={`Achieved: ${formatPercent(kpis.topManager?.pct)}`} icon="Award" delay="delay-400" />
                                <HallOfFameCard theme="primary" title="Top BDE Performer" name={kpis.topBDE?.name} subtitle={`Achieved: ${formatPercent(kpis.topBDE?.pct)}`} icon="TrendingUp" delay="delay-500" />
                            </div>
                        </div>

                        {/* ROW 2: Analytical Charts */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <Card title="Target vs Actual Realization" delay="delay-200">
                                <div className="relative h-[220px] flex items-center justify-center mt-2">
                                    <ChartComponent type="doughnut" data={targetVsActualData} options={{ responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => formatCurrency(ctx.raw) } } }, animation: { animateScale: false } }} height="100%" />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                        <span className="text-3xl font-black text-slate-800 tracking-tight">{formatPercent(kpis.achievementPercent)}</span>
                                        <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-1">Realized</span>
                                    </div>
                                </div>
                                <div className="flex justify-center space-x-6 mt-4 text-[12px] font-semibold text-slate-600 border-t border-slate-50 pt-4">
                                    <div className="flex items-center"><span className="w-3 h-3 rounded-full bg-success-500 mr-2 shadow-sm"></span>Achieved</div>
                                    <div className="flex items-center"><span className="w-3 h-3 rounded-full bg-danger-500 mr-2 shadow-sm"></span>Shortfall</div>
                                </div>
                            </Card>

                            <Card title="Manager Performance Comparison" className="lg:col-span-2" delay="delay-300">
                                <ChartComponent type="bar" data={managerChartData} options={{
                                    responsive: true, maintainAspectRatio: false,
                                    plugins: { legend: { position: 'top', align: 'end', labels: { boxWidth: 12, font: {size: 11, family: 'Inter', weight: '600'} } } },
                                    scales: {
                                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { dash: [4, 4] }, ticks: { font: {size: 11, family: 'Inter', weight: '500'}, callback: v => '₹' + (v/100000).toFixed(1) + 'L' } },
                                        x: { grid: { display: false }, ticks: { font: {size: 11, family: 'Inter', weight: '600'} } }
                                    }
                                }} height="260px" />
                            </Card>
                        </div>

                        {/* ROW 3: BDE Execution Data Grid */}
                        <Card delay="delay-400" title="BDE Execution Data Grid" action={
                            <div className="relative group">
                                <Icon name="Search" size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 transition-colors group-focus-within:text-primary-500" />
                                <input type="text" placeholder="Search BDE..." className="pl-8 pr-3 py-2 border border-slate-200 rounded-lg bg-slate-50 text-[13px] font-medium focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 focus:bg-white w-64 transition-all shadow-sm" value={filters.search} onChange={(e) => setFilters({...filters, search: e.target.value})} />
                            </div>
                        }>
                            <div className="overflow-x-auto custom-scrollbar border border-slate-200 rounded-xl shadow-sm mt-2">
                                <table className="w-full text-left border-collapse data-table whitespace-nowrap">
                                    <thead className="bg-slate-50 text-[11px] text-slate-500 uppercase tracking-widest font-bold border-b border-slate-200">
                                        <tr>
                                            <th className="px-5 py-4 border-r border-slate-100">BDE Name</th>
                                            <th className="px-5 py-4 border-r border-slate-100">Manager</th>
                                            <th className="px-5 py-4 border-r border-slate-100 text-right">Target</th>
                                            <th className="px-5 py-4 border-r border-slate-100 text-right">Achieved</th>
                                            <th className="px-5 py-4 border-r border-slate-100 text-center">Achievement %</th>
                                            <th className="px-5 py-4 border-r border-slate-100 text-right">Daily Run Rate</th>
                                            <th className="px-5 py-4 border-r border-slate-100 text-right">Expected Sales</th>
                                            <th className="px-5 py-4 border-r border-slate-100 text-right">Shortfall</th>
                                            <th className="px-5 py-4 text-center">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-[13px] text-slate-700 bg-white">
                                        {filteredData.length > 0 ? filteredData.map((row, idx) => {
                                            const target = Number(row.Target) || 0;
                                            const achieved = Number(row['Sales Achieved']) || 0;
                                            
                                            // Auto-Calculate Achievement %
                                            const pct = target > 0 ? (achieved / target) * 100 : 0;
                                            
                                            // Auto-Calculate Shortfall automatically
                                            const shortfallVal = Math.max(0, target - achieved);
                                            const expected = Number(row['Expected Sales']) || 0;

                                            return (
                                                <tr key={idx} className="transition-colors group hover:bg-slate-50/50">
                                                    <td className="px-5 py-3 font-bold text-slate-800 border-r border-slate-100">{row['Employee Name'] || '-'}</td>
                                                    <td className="px-5 py-3 font-medium text-slate-500 border-r border-slate-100">{row['Manager Name'] || '-'}</td>
                                                    <td className="px-5 py-3 text-right font-semibold text-slate-500 border-r border-slate-100">{formatCurrency(target)}</td>
                                                    <td className="px-5 py-3 text-right font-black text-slate-900 border-r border-slate-100">{formatCurrency(achieved)}</td>
                                                    <td className="px-5 py-3 border-r border-slate-100">
                                                        <div className="flex items-center justify-end">
                                                            <span className={`font-bold ${getStatusColor(pct)} mr-3 tracking-tight`}>{formatPercent(pct)}</span>
                                                            <div className="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                                                <div className={`h-full rounded-full transition-all duration-500 ${pct >= 100 ? 'bg-success-500' : pct >= 71 ? 'bg-primary-500' : pct >= 31 ? 'bg-warning-500' : 'bg-danger-500'}`} style={{ width: `${Math.min(pct, 100)}%` }}></div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-5 py-3 text-right font-semibold text-slate-600 border-r border-slate-100">{formatCurrency(row['Daily Run Rate'])}</td>
                                                    <td className="px-5 py-3 text-right font-medium text-slate-500 border-r border-slate-100">{formatCurrency(expected)}</td>
                                                    <td className={`px-5 py-3 text-right font-bold border-r border-slate-100 ${shortfallVal > 0 ? 'text-danger-600' : 'text-slate-400'}`}>{shortfallVal > 0 ? formatCurrency(shortfallVal) : '-'}</td>
                                                    <td className="px-5 py-3 text-center">
                                                        <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-widest border ${getStatusBadge(pct)}`}>
                                                            {pct >= 100 ? 'EXCELLENT' : pct >= 71 ? 'GOOD' : pct >= 31 ? 'AVERAGE' : 'CRITICAL'}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        }) : (
                                            <tr><td colSpan="9" className="px-5 py-12 text-center text-slate-400 font-medium">No data available for the selected filters.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
